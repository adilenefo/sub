name: CF IP Speed Test & Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时运行一次
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download CloudflareSpeedTest
        run: |
          ASSET=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest \
            | python3 -c "
import json,sys
for a in json.load(sys.stdin).get('assets',[]):
    if 'linux_amd64' in a['name']:
        print(a['browser_download_url'])
        break
")
          echo "下载: $ASSET"
          curl -sL "$ASSET" | tar -xz -C /tmp
          CFST=$(find /tmp -maxdepth 1 \( -name 'cfst' -o -name 'CloudflareST' \) 2>/dev/null | head -1)
          cp "$CFST" /tmp/CloudflareST && chmod +x /tmp/CloudflareST
          echo "可执行: $(/tmp/CloudflareST -v 2>&1 | head -1)"

      - name: Generate sampled CF IP list
        run: |
          python3 - <<'PYEOF'
          import random, ipaddress

          # CF 官方 IP 段，每段均匀采样
          segments = [
              ("173.245.48.0",  20),
              ("103.21.244.0",  22),
              ("103.22.200.0",  22),
              ("103.31.4.0",    22),
              ("141.101.64.0",  18),
              ("108.162.192.0", 18),
              ("190.93.240.0",  20),
              ("188.114.96.0",  20),
              ("197.234.240.0", 22),
              ("198.41.128.0",  17),
              ("162.158.0.0",   15),
              ("104.16.0.0",    13),
              ("104.24.0.0",    14),
              ("172.64.0.0",    13),
              ("131.0.72.0",    22),
          ]

          all_ips = []
          for net, prefix in segments:
              network = ipaddress.ip_network(f"{net}/{prefix}")
              hosts   = list(network.hosts())
              k       = min(60, len(hosts))
              sampled = random.sample(hosts, k)
              all_ips.extend(str(ip) for ip in sampled)

          random.shuffle(all_ips)
          with open('/tmp/iplist.txt', 'w') as f:
              f.write('\n'.join(all_ips))
          print(f"候选IP数: {len(all_ips)}")
          PYEOF

      - name: Run speed test
        run: |
          /tmp/CloudflareST \
            -f /tmp/iplist.txt \
            -n 200 \
            -tl 300 \
            -tlr 0.3 \
            -dn 3 \
            -dt 3 \
            -p 0 \
            -o /tmp/result.csv
          echo "测速结果行数: $(wc -l < /tmp/result.csv)"
          head -5 /tmp/result.csv

      - name: Assign country labels & generate ADD.txt
        run: |
          python3 - <<'PYEOF'
          import csv, time, urllib.request, json, concurrent.futures, random

          CC_EMOJI = {
              'US':'🇺🇸','JP':'🇯🇵','SG':'🇸🇬','HK':'🇭🇰','KR':'🇰🇷',
              'TW':'🇹🇼','GB':'🇬🇧','DE':'🇩🇪','FR':'🇫🇷','NL':'🇳🇱',
              'AU':'🇦🇺','CA':'🇨🇦','IN':'🇮🇳','BR':'🇧🇷','TR':'🇹🇷',
              'ID':'🇮🇩','MY':'🇲🇾','TH':'🇹🇭','PH':'🇵🇭','VN':'🇻🇳',
          }

          # 读取测速结果
          rows = []
          with open('/tmp/result.csv', newline='', encoding='utf-8-sig') as f:
              for row in csv.DictReader(f):
                  rows.append(row)

          print(f"测速结果: {len(rows)} 行")
          if not rows:
              print("无结果，退出")
              exit(0)

          # 按延迟排序
          def parse_lat(r):
              try: return float(r.get('平均延迟', r.get('Avg Latency','9999')).replace(' ms','').replace('ms',''))
              except: return 9999.0

          rows.sort(key=parse_lat)
          top = rows[:150]

          # 批量查 ip-api（免费，支持 batch，每批最多 100 个）
          def batch_lookup(ips):
              try:
                  payload = json.dumps([{'query': ip, 'fields': 'query,countryCode,city,org'} for ip in ips])
                  req = urllib.request.Request(
                      'http://ip-api.com/batch?fields=query,countryCode,city,org',
                      data=payload.encode(),
                      headers={'Content-Type': 'application/json', 'User-Agent': 'curl/7'},
                      method='POST'
                  )
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"ip-api 批量查询失败: {e}")
                  return []

          # 分两批查（每批最多 100 个）
          ip_col = 'IP 地址' if 'IP 地址' in top[0] else 'IP地址'
          all_top_ips = [r.get(ip_col, r.get('IP Address','')).strip() for r in top if r.get(ip_col, r.get('IP Address',''))]

          geo = {}
          for i in range(0, len(all_top_ips), 100):
              batch = all_top_ips[i:i+100]
              results = batch_lookup(batch)
              for item in results:
                  geo[item.get('query','')] = (item.get('countryCode',''), item.get('city',''), item.get('org',''))
              if i + 100 < len(all_top_ips):
                  time.sleep(1)  # ip-api 限速防护

          print(f"geo 查询完成: {len(geo)} 条")

          # 按国家分组，每国保留最优 3 个
          cc_nodes = {}
          for row in top:
              ip  = row.get(ip_col, row.get('IP Address','')).strip()
              if not ip: continue
              cc, city, org = geo.get(ip, ('','',''))
              if not cc:
                  continue
              lat = parse_lat(row)
              spd_key = '下载速度 (MB/s)' if '下载速度 (MB/s)' in row else 'Download Speed (MB/s)'
              spd = float(row.get(spd_key, '0') or '0')
              if cc not in cc_nodes:
                  cc_nodes[cc] = []
              if len(cc_nodes[cc]) < 3:
                  cc_nodes[cc].append((ip, lat, spd))
                  emoji = CC_EMOJI.get(cc,'')
                  print(f"  ✅ {emoji}{cc} {ip}  {lat:.0f}ms  {spd:.1f}MB/s  {city}")

          print(f"\n国家数: {len(cc_nodes)}")

          # 生成 ADD.txt
          lines = []
          cc_count = {}
          for row in top:
              ip = row.get(ip_col, row.get('IP Address','')).strip()
              if not ip: continue
              cc, _, _ = geo.get(ip, ('','',''))
              if not cc: continue
              nodes = cc_nodes.get(cc, [])
              if not any(n[0] == ip for n in nodes): continue
              cc_count[cc] = cc_count.get(cc, 0) + 1
              emoji = CC_EMOJI.get(cc, '')
              lines.append(f"{ip}:443#{emoji}{cc}-{cc_count[cc]:02d}")

          # 如果按国家分组结果不足（<10个），直接取前30个延迟最低的 IP，用编号命名
          if len(lines) < 10:
              print("国家分组结果不足，回退到延迟排名模式")
              lines = []
              for i, row in enumerate(top[:30]):
                  ip = row.get(ip_col, row.get('IP Address','')).strip()
                  if ip:
                      lines.append(f"{ip}:443#CF-{i+1:02d}")

          with open('/tmp/ADD.txt', 'w') as f:
              f.write('\n'.join(lines))

          print(f"\n✅ 生成 {len(lines)} 个节点")
          print('\n'.join(lines))
          PYEOF

      - name: Update Worker ADD.txt via API
        if: always()
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_PASSWORD: ${{ secrets.WORKER_PASSWORD }}
        run: |
          echo "=== ADD.txt 内容 ==="
          cat /tmp/ADD.txt
          echo "节点数: $(wc -l < /tmp/ADD.txt)"

          if [ ! -s /tmp/ADD.txt ]; then
            echo "ADD.txt 为空，跳过更新"
            exit 0
          fi

          # 登录获取 cookie
          curl -sc /tmp/cookie.txt -X POST "${WORKER_URL}/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: Mozilla/5.0" \
            -d "password=${WORKER_PASSWORD}" > /dev/null

          # 上传 ADD.txt
          RESP=$(curl -s -b /tmp/cookie.txt \
            -X POST "${WORKER_URL}/admin/ADD.txt" \
            -H "User-Agent: Mozilla/5.0" \
            -H "Content-Type: text/plain;charset=UTF-8" \
            --data-binary @/tmp/ADD.txt)

          echo "上传结果: $RESP"
          echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('success') else 1)"

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-results
          path: |
            /tmp/result.csv
            /tmp/ADD.txt
          retention-days: 7
