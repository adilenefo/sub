name: CF Nodes Auto Update

"on":
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_PASSWORD: ${{ secrets.WORKER_PASSWORD }}

    steps:
      - name: Generate node list
        run: |
          pip install requests -q
          echo "" | base64 -d > /tmp/gen_ips.py
          python3 /tmp/gen_ips.py

      - name: Push nodes to Worker
        run: |
          echo "" | base64 -d > /tmp/process_results.py
          python3 /tmp/process_results.py
