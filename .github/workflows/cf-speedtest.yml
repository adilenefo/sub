name: CF Nodes Auto Update

"on":
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download CloudflareSpeedTest
        run: |
          ASSET=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest \
            | python3 -c "import json,sys; [print(a['browser_download_url']) for a in json.load(sys.stdin)['assets'] if 'linux_amd64' in a['name']]" \
            | head -1)
          curl -sL "$ASSET" | tar -xz -C /tmp
          CFST=$(find /tmp -maxdepth 1 -type f \( -name 'cfst' -o -name 'CloudflareST' \) | head -1)
          chmod +x "$CFST"
          ln -sf "$CFST" /usr/local/bin/cfst

      - name: Run speedtest
        run: |
          cfst -n 300 -t 4 -tp 443 -tl 600 -p 20 -dd -o /tmp/result.csv
          echo "测速结果: $(wc -l < /tmp/result.csv) 行"
          head -5 /tmp/result.csv

      - name: Generate Surge nodes
        run: |
          echo "" | base64 -d > /tmp/gen.py
          python3 /tmp/gen.py

      - name: Commit and push
        run: |
          cp /tmp/cf_surge_nodes.txt cf_surge_nodes.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cf_surge_nodes.txt
          git diff --cached --quiet || git commit -m "auto: update CF nodes $(date -u '+%Y-%m-%d %H:%M')"
          git push
