name: CF IP SpeedTest & Update Nodes

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # 每6小时执行一次 (UTC 0/6/12/18点)
  workflow_dispatch:               # 支持手动触发

permissions:
  contents: read
  actions: write

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download CloudflareSpeedTest
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest \
            | python3 -c "import json,sys; assets=json.load(sys.stdin).get('assets',[]); [print(a['browser_download_url']) for a in assets if 'linux_amd64' in a['name']]" \
            | head -1)
          echo "下载地址: $DOWNLOAD_URL"
          curl -sL "$DOWNLOAD_URL" | tar -xz -C /tmp
          CFST=$(find /tmp -maxdepth 1 \( -name 'cfst' -o -name 'CloudflareST' \) 2>/dev/null | head -1)
          cp "$CFST" /tmp/CloudflareST
          chmod +x /tmp/CloudflareST
          echo "版本: $(/tmp/CloudflareST -v 2>&1 | head -1)"

      - name: Generate sampled IP list
        run: |
          python3 << 'PYEOF'
          import random

          # CF 官方 IP 段（仅保留速度最快的几个核心段）
          # 每段随机采样 50 个 IP，总量约 700 个，测速 3 分钟内完成
          SUBNETS = [
              # 核心 CF 段（全球 anycast，覆盖各 PoP）
              ("104.16.0.0",   13),   # 104.16.0.0/13  (~500k IPs) -> 采样
              ("104.24.0.0",   14),   # 104.24.0.0/14
              ("172.64.0.0",   13),   # 172.64.0.0/13
              ("162.158.0.0",  15),   # 162.158.0.0/15
              ("108.162.192.0",18),   # 108.162.192.0/18
              ("141.101.64.0", 18),   # 141.101.64.0/18
              ("190.93.240.0", 20),   # 190.93.240.0/20
              ("188.114.96.0", 20),   # 188.114.96.0/20
              ("197.234.240.0",22),   # 197.234.240.0/22
              ("198.41.128.0", 17),   # 198.41.128.0/17
              ("173.245.48.0", 20),   # 173.245.48.0/20
              ("103.21.244.0", 22),   # 103.21.244.0/22
              ("103.22.200.0", 22),   # 103.22.200.0/22
              ("103.31.4.0",   22),   # 103.31.4.0/22
              ("131.0.72.0",   22),   # 131.0.72.0/22
          ]

          def subnet_to_ips(base, prefix, count=50):
              parts = list(map(int, base.split('.')))
              base_int = (parts[0]<<24)|(parts[1]<<16)|(parts[2]<<8)|parts[3]
              size = 2 ** (32 - prefix)
              actual_count = min(count, size - 2)
              offsets = random.sample(range(1, size - 1), actual_count)
              ips = []
              for off in offsets:
                  n = base_int + off
                  ips.append(f"{(n>>24)&255}.{(n>>16)&255}.{(n>>8)&255}.{n&255}")
              return ips

          all_ips = []
          for base, prefix in SUBNETS:
              ips = subnet_to_ips(base, prefix, 50)
              all_ips.extend(ips)

          random.shuffle(all_ips)
          with open('/tmp/iplist.txt', 'w') as f:
              f.write('\n'.join(all_ips))
          print(f"生成 {len(all_ips)} 个候选 IP")
          PYEOF
          echo "IP 数量: $(wc -l < /tmp/iplist.txt)"

      - name: Run speed test
        run: |
          cd /tmp
          # -n 100: 并发100  -tl 200: 延迟上限200ms  -tlr 0.2: 丢包率<20%
          # -dn 5: 每个IP下载测试5次  -dt 3: 下载测试3s  -p 0: 不打印进度
          ./CloudflareST \
            -f /tmp/iplist.txt \
            -n 100 \
            -tl 200 \
            -tlr 0.2 \
            -tp 443 \
            -dn 5 \
            -dt 3 \
            -o /tmp/result.csv \
            -p 0
          echo "测速完成，结果行数: $(wc -l < /tmp/result.csv)"
          head -5 /tmp/result.csv

      - name: Process results & assign country labels
        run: |
          python3 << 'PYEOF'
          import csv, urllib.request, time, concurrent.futures

          IATA_TO_CC = {
              'HKG':'HK','SIN':'SG','ICN':'KR','NRT':'JP','KIX':'JP','OKA':'JP','FUK':'JP',
              'TPE':'TW','TSA':'TW',
              'LAX':'US','SJC':'US','SEA':'US','ORD':'US','EWR':'US','IAD':'US',
              'DFW':'US','MIA':'US','ATL':'US','JFK':'US','BOS':'US','DEN':'US',
              'LHR':'GB','MAN':'GB',
              'CDG':'FR','LYS':'FR',
              'FRA':'DE','MUC':'DE','BER':'DE',
              'AMS':'NL',
              'ARN':'SE','CPH':'DK','OSL':'NO','HEL':'FI',
              'ZRH':'CH','VIE':'AT','BCN':'ES','FCO':'IT','MXP':'IT',
              'SYD':'AU','MEL':'AU','BNE':'AU','PER':'AU',
              'AKL':'NZ',
              'YYZ':'CA','YVR':'CA','YUL':'CA',
              'GRU':'BR','EZE':'AR','SCL':'CL',
              'JNB':'ZA','NBO':'KE',
              'DXB':'AE','DOH':'QA','RUH':'SA',
              'BOM':'IN','DEL':'IN','BLR':'IN','MAA':'IN',
              'KUL':'MY','CGK':'ID','BKK':'TH','MNL':'PH',
              'IST':'TR',
          }
          CC_EMOJI = {
              'HK':'🇭🇰','SG':'🇸🇬','KR':'🇰🇷','JP':'🇯🇵','TW':'🇹🇼',
              'US':'🇺🇸','GB':'🇬🇧','FR':'🇫🇷','DE':'🇩🇪','NL':'🇳🇱',
              'SE':'🇸🇪','CH':'🇨🇭','AU':'🇦🇺','NZ':'🇳🇿','CA':'🇨🇦',
              'IN':'🇮🇳','BR':'🇧🇷','ZA':'🇿🇦','AE':'🇦🇪','TR':'🇹🇷',
              'MY':'🇲🇾','TH':'🇹🇭','ID':'🇮🇩','PH':'🇵🇭',
              'AT':'🇦🇹','ES':'🇪🇸','IT':'🇮🇹','DK':'🇩🇰','NO':'🇳🇴',
          }

          # 读取测速结果
          rows = []
          try:
              with open('/tmp/result.csv') as f:
                  for row in csv.DictReader(f):
                      rows.append(row)
          except Exception as e:
              print(f"读取失败: {e}")

          print(f"测速结果: {len(rows)} 个 IP")
          if not rows:
              # 备用节点
              with open('/tmp/ADD.txt', 'w') as f:
                  f.write("162.159.192.40:443#🇯🇵JP-01\n162.159.193.40:443#🇺🇸US-01")
              exit(0)

          # 按延迟排序，取前 200 个测速通过的 IP
          rows.sort(key=lambda r: float(r.get('平均延迟','9999').replace('ms','')))
          top = rows[:200]

          # 并发查 colo
          def get_colo(ip):
              try:
                  req = urllib.request.Request(
                      f"http://{ip}/cdn-cgi/trace",
                      headers={'Host':'speed.cloudflare.com','User-Agent':'curl/7'}
                  )
                  with urllib.request.urlopen(req, timeout=3) as r:
                      d = dict(l.split('=',1) for l in r.read().decode().strip().split('\n') if '=' in l)
                  return ip, d.get('colo','').strip(), d.get('loc','').strip()
              except:
                  return ip, '', ''

          print("查询 CF PoP...")
          with concurrent.futures.ThreadPoolExecutor(max_workers=30) as ex:
              colo_results = dict()
              for ip, colo, loc in ex.map(lambda r: get_colo(r.get('IP地址','')), top):
                  if ip:
                      colo_results[ip] = (colo, loc)

          # 按国家分组，每国保留 3 个最优节点
          PER_CC = 3
          PRIORITY = ['HK','JP','SG','KR','TW','US','GB','DE','FR','NL','AU','CA','IN','MY','TH','TR','AE','BR']
          cc_nodes = {}

          for row in top:
              ip = row.get('IP地址','').strip()
              colo, loc = colo_results.get(ip, ('',''))
              cc = IATA_TO_CC.get(colo, loc)
              if not cc:
                  continue
              if cc not in cc_nodes:
                  cc_nodes[cc] = []
              if len(cc_nodes[cc]) < PER_CC:
                  lat = row.get('平均延迟','?')
                  spd = row.get('下载速度 (MB/s)','?')
                  cc_nodes[cc].append((ip, lat, spd))
                  print(f"  ✅ {CC_EMOJI.get(cc,'')}{cc} {ip}  {lat}  {spd}MB/s  [{colo}]")

          # 生成 ADD.txt
          lines = []
          for cc in PRIORITY:
              for idx, (ip, lat, spd) in enumerate(cc_nodes.get(cc, []), 1):
                  lines.append(f"{ip}:443#{CC_EMOJI.get(cc,'')}{cc}-{idx:02d}")
          for cc, nodes in cc_nodes.items():
              if cc in PRIORITY: continue
              for idx, (ip, lat, spd) in enumerate(nodes, 1):
                  lines.append(f"{ip}:443#{CC_EMOJI.get(cc,'')}{cc}-{idx:02d}")

          with open('/tmp/ADD.txt', 'w') as f:
              f.write('\n'.join(lines))

          print(f"\n✅ 生成 {len(lines)} 个节点，覆盖 {len(cc_nodes)} 个国家/地区")
          for line in lines:
              print(f"  {line}")
          PYEOF

      - name: Update Worker ADD.txt via API
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_PASSWORD: ${{ secrets.WORKER_PASSWORD }}
        run: |
          if [ ! -s /tmp/ADD.txt ]; then
            echo "ADD.txt 为空，跳过"
            exit 0
          fi

          echo "=== 节点内容 ==="
          cat /tmp/ADD.txt
          echo ""
          echo "节点数: $(wc -l < /tmp/ADD.txt)"

          # 登录
          curl -s -c /tmp/cookie.txt -b /tmp/cookie.txt \
            -X POST "${WORKER_URL}/login" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "User-Agent: Mozilla/5.0" \
            -d "password=${WORKER_PASSWORD}" > /dev/null

          # 上传
          RESULT=$(curl -s -c /tmp/cookie.txt -b /tmp/cookie.txt \
            -X POST "${WORKER_URL}/admin/ADD.txt" \
            -H "Content-Type: text/plain;charset=UTF-8" \
            -H "User-Agent: Mozilla/5.0" \
            --data-binary @/tmp/ADD.txt)
          echo "上传结果: $RESULT"

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-${{ github.run_number }}
          path: |
            /tmp/result.csv
            /tmp/ADD.txt
          retention-days: 7
