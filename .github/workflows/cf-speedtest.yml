name: CF Speedtest Auto Update

"on":
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  speedtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_PASSWORD: ${{ secrets.WORKER_PASSWORD }}

    steps:
      - name: Download CloudflareSpeedTest
        run: |
          ASSET=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest \
            | python3 -c "import json,sys; [print(a['browser_download_url']) for a in json.load(sys.stdin)['assets'] if 'linux_amd64' in a['name']]" \
            | head -1)
          curl -sL "$ASSET" | tar -xz -C /tmp
          CFST=$(find /tmp -maxdepth 1 \( -name 'cfst' -o -name 'CloudflareST' \) | head -1)
          cp "$CFST" /tmp/cfst && chmod +x /tmp/cfst

      - name: Fetch CF IPs and run speedtest
        run: |
          echo "" | base64 -d > /tmp/gen_ips.py
          python3 /tmp/gen_ips.py
          /tmp/cfst -f /tmp/cf_ips.txt -n 200 -t 4 -tp 443 -tl 600 -p 30 -dd -o /tmp/result.csv
          echo "测速结果行数: $(wc -l < /tmp/result.csv)"
          head -3 /tmp/result.csv

      - name: Process results and update nodes
        run: |
          echo "" | base64 -d > /tmp/process_results.py
          python3 /tmp/process_results.py
